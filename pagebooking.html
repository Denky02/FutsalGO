<!DOCTYPE html>
<html>
<head>
  <title>FutsalGO - Booking</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .btn-orange { background-color:#FF6600; color:#fff; }
    .btn-orange:hover { background-color:#cc5200; color:#fff; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark" style="background-color:#FF6600;">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="pagebooking.html">
        FutsalGO
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link active" href="pagebooking.html">Booking</a></li>
          <li class="nav-item"><a class="nav-link" href="pageriwayat.html">Riwayat</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container d-flex justify-content-center align-items-center" style="min-height:80vh;">
    <div class="card shadow p-4" style="max-width:400px; width:100%;">
      <h2 class="text-center fw-bold mb-3">Booking Lapangan</h2>
      <p class="text-center fst-italic text-dark">Pilih lapangan dan waktu booking!</p>
      <form id="formBooking">
        <div class="mb-3">
          <label for="lapangan" class="form-label">Lapangan:</label>
          <select id="lapangan" class="form-select" required>
            <option value="">-- Pilih Lapangan --</option>
            <option value="Lapangan A">Lapangan A</option>
            <option value="Lapangan B">Lapangan B</option>
            <option value="Lapangan C">Lapangan C</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="tanggal" class="form-label">Tanggal:</label>
          <input type="date" id="tanggal" class="form-control" required>
        </div>
        <div class="mb-3">
          <label for="jam" class="form-label">Jam:</label>
          <input type="time" id="jam" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-orange w-100">Booking</button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById("formBooking").addEventListener("submit", function(e){
      e.preventDefault()
      let lapangan = document.getElementById("lapangan").value
      let tanggal = document.getElementById("tanggal").value
      let jam = document.getElementById("jam").value
      let bookings = JSON.parse(localStorage.getItem("bookings")) || []
      bookings.push({lapangan, tanggal, jam})
      localStorage.setItem("bookings", JSON.stringify(bookings))
      alert("Booking berhasil! Silahkan cek riwayat untuk melihat pesanan Anda.")
      window.location.href = "pageriwayat.html"
    })
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
