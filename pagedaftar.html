<!DOCTYPE html>
<html>
<head>
  <title>FutsalGO - Daftar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .btn-orange { background-color:#FF6600; color:#fff; }
    .btn-orange:hover { background-color:#cc5200; color:#fff; }
    .logo-ball {
      width:32px; height:32px;
      vertical-align:middle;
      margin-left:-11px;
      margin-bottom:5px;
    }
    .text-orange { color:#FF6600; }
  </style>
</head>
<body>
  <div class="container d-flex justify-content-center align-items-center" style="min-height:80vh; margin-top:40px;">
    <div class="card shadow p-4" style="max-width:400px; width:100%;">
      <h2 class="text-center fw-bold mb-3">
        FutsalG <img src="Aset/bola.png" alt="O" class="logo-ball">
      </h2>
      <p class="text-center fst-italic text-dark">Daftar akun untuk mulai booking!</p>
      
      <form onsubmit="return daftarSuccess()" action="pagelogin.html" method="get">
        <div class="mb-3">
          <label for="nama" class="form-label">Nama Lengkap:</label>
          <input type="text" class="form-control" id="nama" name="nama" required>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email:</label>
          <input type="email" class="form-control" id="email" name="email" required>
        </div>
        <div class="mb-3">
          <label for="telp" class="form-label">Nomor Telepon:</label>
          <input type="tel" class="form-control" id="telp" name="telp" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Kata Sandi:</label>
          <input type="password" class="form-control" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-orange w-100">Daftar</button>
      </form>
      
      <p class="mt-3 text-center">Sudah punya akun? 
        <a href="pagelogin.html" class="text-orange text-decoration-none">Login di sini</a>
      </p>
    </div>
  </div>

  <script>
    function daftarSuccess() {
      alert("Selamat! Anda berhasil registrasi akun. Silahkan login untuk mulai booking!");
      return true;
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
