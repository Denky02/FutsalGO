<!DOCTYPE html>
<html>
<head>
  <title>FutsalGO - Riwayat Booking</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .navbar-orange { background-color: #FF6600; }
    .navbar-orange .nav-link, .navbar-orange .navbar-brand { color:#fff; }
    .navbar-orange .nav-link:hover { color:#ffe0cc; }
    .btn-orange {
      background-color:#FF6600;
      color:#fff;
      display:inline-block;
      width:auto;
      white-space:nowrap;
      padding:6px 16px;
      border-radius:6px;
    }
    .btn-orange:hover { background-color:#cc5200; color:#fff; }
    .table-header-orange th { background-color:#ffcc99 !important; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-orange">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="index.html">FutsalGO</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="pagebooking.html">Booking</a></li>
          <li class="nav-item"><a class="nav-link active" href="pageriwayat.html">Riwayat</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container" style="margin-top:40px;">
    <div class="card shadow p-4 text-center">
      <div id="riwayat"></div>
      <div class="mt-3">
        <button onclick="hapusRiwayat()" class="btn btn-orange">Hapus Semua Riwayat</button>
      </div>
    </div>
  </div>

  <script>
    const container = document.getElementById("riwayat");
    function loadRiwayat() {
      let bookings = JSON.parse(localStorage.getItem("bookings")) || [];
      container.innerHTML = "";
      if (bookings.length === 0) {
        container.innerHTML = "<p class='text-dark fst-italic'>Belum ada riwayat booking.</p>";
      } else {
        let table = `
          <table class="table table-bordered text-center align-middle">
            <thead class="table-header-orange">
              <tr>
                <th style="width:25%">Lapangan</th>
                <th style="width:25%">Tanggal</th>
                <th style="width:25%">Jam</th>
                <th style="width:25%">Aksi</th>
              </tr>
            </thead>
            <tbody>
        `;
        bookings.forEach((b, i) => {
          table += `
            <tr>
              <td>${b.lapangan}</td>
              <td>${b.tanggal}</td>
              <td>${b.jam}</td>
              <td><button class="btn btn-danger btn-sm" onclick="hapusSatu(${i})">Hapus</button></td>
            </tr>
          `;
        });
        table += "</tbody></table>";
        container.innerHTML = table;
      }
    }
    function hapusRiwayat() {
      localStorage.removeItem("bookings");
      loadRiwayat();
      alert("Semua riwayat booking telah dihapus.");
    }
    function hapusSatu(index) {
      let bookings = JSON.parse(localStorage.getItem("bookings")) || [];
      bookings.splice(index, 1);
      localStorage.setItem("bookings", JSON.stringify(bookings));
      loadRiwayat();
      alert("Riwayat booking berhasil dihapus.");
    }
    loadRiwayat();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
